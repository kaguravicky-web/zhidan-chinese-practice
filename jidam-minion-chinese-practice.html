<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>智澹中文练习</title>
  <style>
    :root {
      --blue: #1f6fbf;
      --blue-dark: #154a80;
      --blue-soft: #eaf4ff;
      --bg: #f6f9fc;
      --card: #ffffff;
      --text: #17212b;
      --muted: #637083;
      --line: #d9e4ef;
      --ok: #1f8a50;
      --bad: #c94b42;
      --grid: #d9b957;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    body::before {
      content: "";
      display: block;
      height: 8px;
      background: repeating-linear-gradient(90deg, #1769aa 0 54px, #fff 54px 74px, #f2c94c 74px 128px, #fff 128px 148px);
    }
    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .top {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    h1 { margin: 0; font-size: clamp(24px, 4vw, 34px); color: var(--blue-dark); letter-spacing: 0; }
    h2 { margin: 0 0 12px; color: var(--blue-dark); }
    .sub { margin: 4px 0 0; color: var(--muted); font-weight: 700; }
    .score {
      min-width: 156px;
      border-radius: 8px;
      background: var(--blue-soft);
      padding: 10px 12px;
      text-align: center;
      font-weight: 800;
      color: var(--blue-dark);
    }
    .parent-open { justify-self: end; }
    .voice-panel {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-weight: 700;
    }
    dialog {
      width: min(680px, calc(100% - 28px));
      border: 0;
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 22px 70px rgba(10, 48, 84, .28);
    }
    dialog::backdrop { background: rgba(20, 48, 75, .48); }
    .parent-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      color: #fff;
      background: var(--blue-dark);
    }
    .parent-head h2 { margin: 0; color: #fff; }
    .parent-body { padding: 18px; }
    .setting-block { padding: 14px 0; border-bottom: 1px solid var(--line); }
    .setting-block:last-child { border-bottom: 0; }
    .upload-zone {
      display: block;
      margin-top: 10px;
      padding: 20px;
      text-align: center;
      border: 2px dashed #8bb7df;
      border-radius: 8px;
      background: var(--blue-soft);
      cursor: pointer;
      font-weight: 800;
    }
    .upload-zone input { display: none; }
    .photo-preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .photo-preview img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; border-radius: 6px; }
    select, input[type="range"] {
      min-height: 36px;
      border: 1px solid #bfd0e2;
      border-radius: 8px;
      background: #fff;
      padding: 4px 8px;
      font: inherit;
    }
    main { max-width: 1180px; margin: 0 auto; padding: 18px; }
    button {
      font: inherit;
      border: 1px solid #bfd0e2;
      border-radius: 8px;
      min-height: 42px;
      padding: 8px 13px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font-weight: 700;
    }
    button:hover { border-color: var(--blue); }
    button.primary { background: var(--blue); border-color: var(--blue); color: white; }
    button.ghost { background: transparent; }
    button.selected { background: #dbeeff; border-color: var(--blue); color: var(--blue-dark); }
    button.good { background: #e4f6eb; border-color: var(--ok); color: #126236; }
    button.bad { background: #ffe9e7; border-color: var(--bad); color: #9b2c25; }
    button:disabled { cursor: default; opacity: 1; }
    .view { display: none; }
    .view.active { display: block; }
    .home-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }
    .course-card, .panel, .practice-card, .garage {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(28, 73, 118, .06);
    }
    .course-card { padding: 18px; }
    .course-card::before {
      content: "🏎️  本周赛道";
      display: block;
      margin-bottom: 10px;
      color: var(--blue);
      font-weight: 900;
    }
    .course-card h2 { font-size: 24px; }
    .course-meta { color: var(--muted); line-height: 1.7; margin: 10px 0 16px; }
    .garage { margin-top: 16px; padding: 16px; }
    .garage h2::before { content: "🏁 "; }
    .wrong-book { margin-top: 16px; padding: 16px; }
    .wrong-book h2::before { content: "📒 "; }
    .wrong-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--line);
    }
    .car-row { display: flex; gap: 10px; flex-wrap: wrap; min-height: 48px; align-items: center; }
    .car {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--blue-soft);
      color: var(--blue-dark);
      font-weight: 800;
    }
    .panel { display: none; padding: 16px; }
    .panel.active { display: block; }
    .back-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .tabs, .subtabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .subtab.active { background: #dbeafe; color: var(--blue-dark); border-color: #93c5fd; }
    .bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin: 10px 0 14px; }
    .note { color: var(--muted); font-weight: 700; }
    .practice-list { display: grid; gap: 14px; }
    .practice-section { display: none; }
    .practice-section.active { display: block; }
    .practice-card { padding: 14px; }
    .dictation-group { margin-bottom: 18px; }
    .dictation-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .dictation-head h3 { margin: 0; color: var(--blue-dark); font-size: 22px; }
    .dictation-list { display: grid; gap: 8px; }
    .dictation-item {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto auto 52px;
      gap: 10px;
      align-items: center;
      min-height: 66px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .dictation-group:not(.show-mastered) .dictation-item.mastered { display: none; }
    .dictation-item.mastered {
      border-color: var(--ok);
      background: #f0fbf4;
      opacity: .72;
    }
    .dictation-number { color: var(--blue); font-size: 20px; font-weight: 900; }
    .dictation-text { font-size: 22px; font-weight: 800; line-height: 1.45; }
    .dictation-hint { display: none; font-size: 22px; font-weight: 900; color: var(--blue-dark); letter-spacing: 2px; }
    .dictation-item.is-hidden .dictation-text,
    .dictation-item.is-hidden .pinyin { display: none; }
    .dictation-item.is-partial .dictation-text,
    .dictation-item.is-partial .pinyin { display: none; }
    .dictation-item.is-partial .dictation-hint { display: block; }
    .dictation-item.is-hidden .dictation-content::before {
      content: "文字已隐藏，听声音默写";
      color: var(--muted);
      font-weight: 800;
    }
    .peek-one, .master-one { white-space: nowrap; }
    .card-head {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      gap: 8px;
      align-items: center;
    }
    .speak { width: 44px; padding: 0; }
    .item-title { font-size: 22px; font-weight: 800; }
    .pinyin { color: var(--muted); font-size: 14px; }
    .copy-text {
      margin: 12px 0;
      min-height: 34px;
      font-size: 28px;
      color: rgba(23, 33, 43, .38);
      font-weight: 800;
      line-height: 1.6;
    }
    .copy-text.hidden { font-size: 20px; color: var(--muted); }
    .tianzige-row { display: flex; gap: 12px; flex-wrap: wrap; margin: 10px 0; }
    .tianzi {
      position: relative;
      width: 170px;
      height: 170px;
      border: 2px solid var(--grid);
      border-radius: 4px;
      background:
        linear-gradient(90deg, transparent 49.4%, rgba(217,185,87,.7) 49.4% 50.6%, transparent 50.6%),
        linear-gradient(transparent 49.4%, rgba(217,185,87,.7) 49.4% 50.6%, transparent 50.6%),
        linear-gradient(45deg, transparent 49.5%, rgba(217,185,87,.42) 49.5% 50.5%, transparent 50.5%),
        linear-gradient(-45deg, transparent 49.5%, rgba(217,185,87,.42) 49.5% 50.5%, transparent 50.5%),
        #fffefa;
    }
    .trace-char {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-size: 104px;
      font-weight: 800;
      color: rgba(23,33,43,.16);
      pointer-events: none;
      user-select: none;
    }
    .draw {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      cursor: crosshair;
    }
    .question {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 8px 12px;
      padding: 14px;
      margin: 12px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }
    .qtext { font-size: 20px; line-height: 1.55; }
    .vocab-help {
      min-height: 0;
      padding: 0 2px;
      border: 0;
      border-bottom: 2px dotted var(--blue);
      border-radius: 0;
      background: #eff7ff;
      color: var(--blue-dark);
      font: inherit;
      font-weight: 900;
      cursor: help;
    }
    .vocab-help:hover { background: #dbeafe; }
    .vocab-popover {
      position: fixed;
      z-index: 20;
      left: min(24px, 5vw);
      right: min(24px, 5vw);
      bottom: 18px;
      max-width: 560px;
      margin: 0 auto;
      padding: 14px;
      border: 1px solid #93c5fd;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 18px 45px rgba(15, 58, 104, .18);
      color: var(--ink);
    }
    .vocab-popover[hidden] { display: none; }
    .vocab-popover h3 { margin: 0 0 4px; color: var(--blue-dark); font-size: 24px; }
    .vocab-popover p { margin: 5px 0; line-height: 1.55; }
    .vocab-popover .bar { margin-bottom: 0; }
    .vocab-strip {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      color: var(--muted);
      font-weight: 800;
      padding: 2px 0 4px;
    }
    .vocab-chip {
      min-height: 30px;
      padding: 3px 8px;
      border: 1px solid #93c5fd;
      background: #eff7ff;
      color: var(--blue-dark);
    }
    .options {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
    }
    .option { text-align: left; min-height: 46px; }
    .answer-line {
      grid-column: 1 / -1;
      min-height: 24px;
      font-weight: 800;
      color: var(--blue-dark);
      background: #eef7ff;
      border-left: 4px solid var(--blue);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .answer-line:empty { display: none; }
    .tutor-box {
      grid-column: 1 / -1;
      border: 1px solid #c9ddf3;
      border-radius: 8px;
      background: #f4f9ff;
      padding: 10px 12px;
      color: var(--blue-dark);
      line-height: 1.55;
    }
    .tutor-box:empty { display: none; }
    .tutor-title { font-weight: 900; margin-bottom: 4px; }
    .tutor-actions { display: flex; gap: 8px; flex-wrap: wrap; margin: 6px 0 8px; }
    .tutor-actions button { min-height: 34px; padding: 5px 10px; }
    .picked-line {
      grid-column: 1 / -1;
      min-height: 48px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px dashed #bfd0e2;
      border-radius: 8px;
      background: #f7fbff;
    }
    .picked-line button { background: #eef7ff; }
    .picked-line button.good { background: #e4f6eb; border-color: var(--ok); color: #126236; }
    .picked-line button.bad { background: #ffe9e7; border-color: var(--bad); color: #9b2c25; }
    .order-actions { grid-column: 1 / -1; }
    .sequence-card {
      grid-column: 1 / -1;
      display: grid;
      gap: 6px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    .sequence-row {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 8px;
      align-items: start;
      padding: 6px 8px;
      border-radius: 8px;
      background: #f7fbff;
      line-height: 1.35;
    }
    .sequence-row.fixed { background: #eef7ff; font-weight: 800; }
    .sequence-row.good { background: #eaf8ef; }
    .sequence-row.bad { background: #fff0ef; }
    .sequence-input {
      width: 46px;
      padding: 6px;
      border: 1px solid #bfd0e2;
      border-radius: 8px;
      font: inherit;
      font-weight: 900;
      text-align: center;
      color: var(--blue-dark);
    }
    .cloze-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      line-height: 2.05;
      font-size: 22px;
    }
    .blank {
      display: inline-block;
      min-width: 96px;
      padding: 0 8px;
      border-bottom: 3px solid var(--blue);
      text-align: center;
      font-weight: 800;
      color: var(--blue);
    }
    .blank.bad { border-color: var(--bad); color: var(--bad); background: #fff0ef; }
    .blank.good { border-color: var(--ok); color: var(--ok); background: #eaf8ef; }
    .word-bank { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    .result {
      display: none;
      margin-top: 16px;
      padding: 18px;
      border-radius: 8px;
      background: linear-gradient(135deg, #eaf4ff, #fff);
      border: 1px solid var(--line);
      text-align: center;
    }
    .version {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
    .result h2 { font-size: 30px; }
    @media (max-width: 760px) {
      .top { grid-template-columns: 1fr; }
      .score { text-align: left; }
      .card-head { grid-template-columns: auto 1fr auto; }
      .card-head .toggle-copy { grid-column: 1 / -1; }
      .tianzi { width: 140px; height: 140px; }
      .trace-char { font-size: 88px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div>
        <h1>智澹中文练习</h1>
        <p class="sub" id="pageSub">每周课程复习</p>
      </div>
      <div class="score">
        <div>本次：<span id="doneCount">0</span>/<span id="totalCount">0</span></div>
        <div>得分：<span id="scoreText">0</span></div>
      </div>
      <button class="parent-open" id="openParent">⚙ 家长设置</button>
    </div>
  </header>

  <main>
    <section class="view active" id="homeView">
      <div class="home-grid" id="courseList"></div>
      <div class="garage">
        <h2>智澹的车库</h2>
        <div class="car-row" id="garageCars"></div>
      </div>
      <div class="garage wrong-book">
        <h2>错题本</h2>
        <div id="wrongBook"></div>
      </div>
    </section>

    <section class="view" id="courseView">
      <div class="back-row">
        <button class="ghost" id="backHome">← 返回课程主页</button>
        <span class="note">先朗读听写清单，再完成课堂练习。</span>
      </div>
      <nav class="tabs">
        <button class="tab active" data-panel="schoolWritingPanel">学校听写</button>
        <button class="tab" data-panel="hclWritingPanel">HCL 听写</button>
        <button class="tab" data-panel="hclPracticePanel">HCL 作业练习</button>
      </nav>
      <section class="panel active" id="schoolWritingPanel">
        <h2>学校听写</h2>
        <p class="note">学校部分只有听写，用声音练默写。</p>
        <div class="practice-list" id="schoolWritingList"></div>
      </section>
      <section class="panel" id="hclWritingPanel">
        <h2>HCL 听写</h2>
        <div class="practice-list" id="hclWritingList"></div>
      </section>
      <section class="panel" id="hclPracticePanel">
        <h2>HCL 作业练习</h2>
        <nav class="subtabs">
          <button class="subtab active" data-section="mcqSection">选择题</button>
          <button class="subtab" data-section="matchSection">词语搭配</button>
          <button class="subtab" data-section="orderSection">排序组句</button>
          <button class="subtab" data-section="clozeSection">短文填空</button>
        </nav>
        <section class="practice-section active" id="mcqSection">
          <h3>选择题</h3>
          <div id="mcqList"></div>
        </section>
        <section class="practice-section" id="matchSection">
          <h3>词语搭配</h3>
          <div id="matchList"></div>
        </section>
        <section class="practice-section" id="orderSection">
          <h3>排序组句</h3>
          <div id="orderList"></div>
        </section>
        <section class="practice-section" id="clozeSection">
          <h3>短文填空</h3>
          <div id="clozeList"></div>
        </section>
      </section>
      <section class="result" id="resultBox"></section>
      <div class="version">v2026-07-15-1</div>
    </section>
  </main>

  <dialog id="parentDialog">
    <div class="parent-head">
      <h2>家长设置</h2>
      <button id="closeParent" aria-label="关闭家长设置">✕</button>
    </div>
    <div class="parent-body">
      <div class="setting-block">
        <h3>朗读声音</h3>
        <div class="voice-panel">
          <select id="voiceSelect" aria-label="选择朗读声音"></select>
          <span>语速</span>
          <input id="rateSlider" type="range" min="0.35" max="0.8" step="0.05" value="0.5" aria-label="语速">
          <span id="rateText">慢</span>
          <button id="testVoice">试听</button>
        </div>
      </div>
      <div class="setting-block">
        <h3>生成下一节课</h3>
        <p class="note">上传本周听写和课堂练习照片，可一次选择多张。</p>
        <label class="upload-zone">📷 选择作业照片
          <input id="lessonPhotos" type="file" accept="image/*" multiple>
        </label>
        <div class="photo-preview" id="photoPreview"></div>
        <p class="note" id="uploadStatus">尚未选择照片</p>
        <button class="primary" id="prepareLesson" disabled>准备下一课资料</button>
      </div>
    </div>
  </dialog>

  <script>
    const courses = [{
      id: "lesson-10",
      title: "2026-07-15",
      date: "第十课",
      summary: "学校听写 8 项、HCL 听写 16 项、HCL 作业练习",
      words: [
        ["收拾", "shou shi"], ["漂亮", "piao liang"], ["追上", "zhui shang"], ["觉得", "jue de"],
        ["决定", "jue ding"], ["保持", "bao chi"], ["伸出手", "shen chu shou"], ["浪费", "lang fei"],
        ["一份报纸", "yi fen bao zhi"], ["废物", "fei wu"], ["使用", "shi yong"], ["环境", "huan jing"],
        ["塑料袋", "su liao dai"], ["责任", "ze ren"], ["如果", "ru guo"], ["乱扔垃圾", "luan reng la ji"]
      ],
      sentences: [
        "收拾桌子", "保护环境", "感到吃惊", "伸出双手", "快步追上", "一枝漂亮的花",
        "只有多练习，你才能跑得更快",
        "我觉得乱扔垃圾是不对的，因为会把地板弄脏"
      ],
      mcq: [
        ["姑姑年轻时的____子很美丽。", ["祥", "样", "详", "洋"], 1],
        ["小乐不爱____书，只喜欢玩电脑。", ["读", "续", "实", "卖"], 0],
        ["你____住我说的话了吗？", ["己", "已", "记", "纪"], 2],
        ["小明每年都考____一名，我们要向他学习。", ["弟", "沸", "第", "梯"], 2],
        ["我有一个____望，长大后当一名医生。", ["圆", "愿", "员", "原"], 1],

    function tone(freq, duration, type = "sine", gainValue = 0.08, delay = 0) {
      const ctx = window._ctx || (window._ctx = audioCtx());
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.frequency.value = freq;
      osc.type = type;
      gain.gain.value = gainValue;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
      osc.stop(ctx.currentTime + delay + duration);
    }

      const pattern = new RegExp(words.map(escapeRegex).join("|"), "g");
      let html = "";
      let last = 0;
      text.replace(pattern, (word, offset) => {
        html += escapeHTML(text.slice(last, offset));
        html += `<button type="button" class="vocab-help" data-word="${escapeHTML(word)}">${escapeHTML(word)}</button>`;
        last = offset + word.length;
        return word;
      });
      html += escapeHTML(text.slice(last));
      return html;
    }

    function prepareCanvas(canvas) {
      const resize = () => {
        const ratio = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.max(1, Math.floor(rect.width * ratio));
        canvas.height = Math.max(1, Math.floor(rect.height * ratio));
        const ctx = canvas.getContext("2d");
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.lineWidth = 7 * ratio;
        ctx.strokeStyle = "#111827";
        canvas._ctx = ctx;
        canvas._ratio = ratio;
      };
      resize();
      let drawing = false;
      const pos = e => {
        const r = canvas.getBoundingClientRect();
        return { x: (e.clientX - r.left) * canvas._ratio, y: (e.clientY - r.top) * canvas._ratio };
      };
      canvas.addEventListener("pointerdown", e => {
        e.preventDefault();
        canvas.setPointerCapture(e.pointerId);
        drawing = true;
        const p = pos(e);
        canvas._ctx.beginPath();
        canvas._ctx.moveTo(p.x, p.y);
      });
      canvas.addEventListener("pointermove", e => {
        if (!drawing) return;
        e.preventDefault();
        const p = pos(e);
        canvas._ctx.lineTo(p.x, p.y);
        canvas._ctx.stroke();
      });
      canvas.addEventListener("pointerup", () => drawing = false);
      canvas.addEventListener("pointercancel", () => drawing = false);
      canvas.clearBox = () => canvas._ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function makeDictationHint(text) {
      return text.split(/([，。！？；：,.!?;:])/).map(part => {
        if (/^[，。！？；：,.!?;:]$/.test(part)) return part;
        const chars = Array.from(part);
        const chineseIndexes = chars.map((char, index) => /[\u3400-\u9fff]/.test(char) ? index : -1).filter(index => index >= 0);
        if (!chineseIndexes.length) return chars.map(char => char.trim() ? "□" : char).join("");
        const visible = new Set([chineseIndexes[0]]);
        if (chineseIndexes.length >= 4) visible.add(chineseIndexes[chineseIndexes.length - 1]);
        return chars.map((char, index) => /[\u3400-\u9fff]/.test(char) && !visible.has(index) ? "□" : char).join("");
      }).join("");
    }

            setTutor(tutorBox, {
              en: "Good job. This question is out of the wrong book.",
              zh: "做得好。这题已经从错题本移除了。"
            });
          }
          if (!isRight) {
            const tutor = tutorForQuestion(prefix, q, opts, ans, selected);
            setTutor(tutorBox, tutor);
            recordWrong({
              key: meta?.key || makeQuestionKey(prefix, q, opts[ans]),
              kind: prefix,
              question: q,
              options: opts,
              answer: ans,
              chosen: selected,
              prompt: questionAnswerText(q, opts[ans]),
              tutor
            });
          }
          markQuestion(prefix + i, isRight);
        };
        list.appendChild(row);
      });
    }
    function renderOrder() {
      const list = document.getElementById("orderList");
      list.innerHTML = "";
      (currentCourse.order || []).forEach((item, i) => {
        const row = document.createElement("div");
        row.className = "question";
        row.innerHTML = `<button class="speak" title="朗读">🔊</button><div class="qtext">${i + 1}. ${annotateText(item.prompt)}</div><div class="answer-line"></div><div class="tutor-box"></div><div class="options"></div><div class="word-bank"></div>`;
        addVocabStrip(row, [item.prompt, item.fixed, ...(item.lines || []).map(line => line.text), ...(item.parts || [])]);
        if (item.type === "sequence") {
          renderSequenceOrder(row, item, i);
          list.appendChild(row);
          return;
        }
        const picked = [];
        const answerLine = row.querySelector(".answer-line");
        const tutorBox = row.querySelector(".tutor-box");
        const options = row.querySelector(".options");
        const bank = row.querySelector(".word-bank");
        row.querySelector(".speak").onclick = () => speak(item.parts.join("，"));
        const pickedLine = document.createElement("div");
        pickedLine.className = "picked-line";
        row.insertBefore(pickedLine, options);
        pickedLine.insertAdjacentElement("afterend", answerLine);
        answerLine.insertAdjacentElement("afterend", tutorBox);
        const submitOrder = document.createElement("button");
        submitOrder.className = "primary";
        submitOrder.textContent = "确认句子";
        submitOrder.disabled = true;
        const giveUp = document.createElement("button");
        giveUp.className = "ghost";
        giveUp.textContent = "我放弃，看答案";
        function refresh() {
          pickedLine.innerHTML = "";
          if (!picked.length) {
            const hint = document.createElement("span");
            hint.className = "note";
            hint.textContent = "点击下面词语来组句";
            pickedLine.appendChild(hint);
          }
          picked.forEach((partIndex, pickedIndex) => {
            const chip = document.createElement("button");
            chip.textContent = item.parts[partIndex];
            chip.title = "点我撤回这个词";
            chip.onclick = () => {
              if (done.has("o" + i)) return;
              picked.splice(pickedIndex, 1);
              const original = bank.querySelector(`[data-index="${partIndex}"]`);
              if (original) original.disabled = false;
              row.classList.remove("good", "bad");
              answerLine.textContent = "";
              tutorBox.innerHTML = "";
              refresh();
            };
            pickedLine.appendChild(chip);
          });
          submitOrder.disabled = picked.length !== item.answer.length || done.has("o" + i);
        }
        function markPickedWords() {
          [...pickedLine.querySelectorAll("button")].forEach((chip, pickedIndex) => {
            chip.classList.remove("good", "bad");
            chip.classList.add(item.answer[pickedIndex] === picked[pickedIndex] ? "good" : "bad");
          });
        }
        function reset() {
          picked.length = 0;
          answerLine.textContent = "";
          tutorBox.innerHTML = "";
          row.classList.remove("good", "bad");
          [...bank.children].forEach(button => {
            button.disabled = false;
            button.classList.remove("good", "bad");
          });
          refresh();
        }
        item.parts.forEach((part, index) => {
          const button = document.createElement("button");
          button.textContent = item.type === "sentences" ? `${index + 1}. ${part}` : part;
          button.dataset.index = index;
          button.onclick = () => {
            if (done.has("o" + i)) return;
            picked.push(index);
            button.disabled = true;
            row.classList.remove("good", "bad");
            answerLine.textContent = "";
            tutorBox.innerHTML = "";
            refresh();
          };
          bank.appendChild(button);
        });
        submitOrder.onclick = () => {
          if (picked.length !== item.answer.length || done.has("o" + i)) return;
          const isRight = item.answer.every((answerIndex, orderIndex) => answerIndex === picked[orderIndex]);
          row.classList.toggle("good", isRight);
          row.classList.toggle("bad", !isRight);
          if (isRight) {
            answerLine.textContent = item.finalText || picked.map(index => item.parts[index]).join("");
            markPickedWords();
            setTutor(tutorBox, {
              en: "Good. The sentence order is right.",
              zh: "很好。句子顺序对了。"
            });
            [...bank.children].forEach(x => x.disabled = true);
            submitOrder.disabled = true;
            giveUp.disabled = true;
            if (item.wrongKey) removeWrong(item.wrongKey);
            markQuestion("o" + i, true);
          } else {
            const tutor = tutorForWordOrder(item);
            markPickedWords();
            answerLine.innerHTML = `<div>正确答案：${escapeHTML(item.finalText)}</div><button class="ghost retry-order">再试一次</button>`;
            answerLine.querySelector(".retry-order").onclick = reset;
            setTutor(tutorBox, tutor);
            recordWrong({
              key: item.wrongKey || makeQuestionKey("order", item.prompt, item.finalText),
              kind: "order",
              item,
              prompt: item.prompt,
              finalText: item.finalText,
              tutor
            });
            funnyWrongSound();
          }
        };
        giveUp.onclick = () => {
          if (done.has("o" + i)) return;
          answerLine.textContent = item.finalText;
          setTutor(tutorBox, tutorForWordOrder(item));
          [...bank.children].forEach(x => x.disabled = true);
          pickedLine.querySelectorAll("button").forEach(x => x.disabled = true);
          submitOrder.disabled = true;
          giveUp.disabled = true;
          recordWrong({
            key: item.wrongKey || makeQuestionKey("order", item.prompt, item.finalText),
            kind: "order",
            item,
            prompt: item.prompt,
            finalText: item.finalText,
            tutor: tutorForWordOrder(item)
          });
          markQuestion("o" + i, false);
        };
        const resetButton = document.createElement("button");
        resetButton.className = "ghost";
        resetButton.textContent = "重排";
        resetButton.onclick = reset;
        options.classList.add("order-actions");
        options.appendChild(submitOrder);
        options.appendChild(resetButton);
        options.appendChild(giveUp);
        refresh();
        list.appendChild(row);
      });
    }
    function renderSequenceOrder(row, item, index) {
      const answerLine = row.querySelector(".answer-line");
      const tutorBox = row.querySelector(".tutor-box");
      const options = row.querySelector(".options");
      const bank = row.querySelector(".word-bank");
      row.querySelector(".speak").onclick = () => speak([item.fixed, ...item.lines.map(line => line.text)].join(" "));
      options.innerHTML = "";
      bank.className = "sequence-card";
      bank.insertAdjacentElement("afterend", answerLine);
      answerLine.insertAdjacentElement("afterend", tutorBox);
      const fixedRow = document.createElement("div");
      fixedRow.className = "sequence-row fixed";
      fixedRow.innerHTML = `<div>（1）</div><div>${annotateText(item.fixed)}</div>`;
      bank.appendChild(fixedRow);
      function checkSequence() {
        if (done.has("o" + index)) return;
        const inputs = [...bank.querySelectorAll(".sequence-input")];
        const values = inputs.map(input => Number(input.value));
        if (values.some(value => !item.choices.includes(value))) {
          answerLine.textContent = `请在每个空格填 ${item.choices.join("、")}。`;
          funnyWrongSound();
          return;
        }
        if (new Set(values).size !== values.length) {
          answerLine.textContent = "每个序号只能用一次。";
          funnyWrongSound();
          return;
        }
        const isRight = item.lines.every((line, lineIndex) => values[lineIndex] === line.answer);
        row.classList.toggle("good", isRight);
        row.classList.toggle("bad", !isRight);
        bank.querySelectorAll(".sequence-row:not(.fixed)").forEach((lineRow, lineIndex) => {
          lineRow.classList.toggle("good", values[lineIndex] === item.lines[lineIndex].answer);
          lineRow.classList.toggle("bad", values[lineIndex] !== item.lines[lineIndex].answer);
        });
        if (isRight) {
          answerLine.textContent = "顺序正确。";
          setTutor(tutorBox, {
            en: "Great. You used time order.",
            zh: "很好。你按时间顺序排对了。"
          });
          inputs.forEach(input => input.disabled = true);
          checkButton.disabled = true;
          checkButton.textContent = "已确认";
          if (item.wrongKey) removeWrong(item.wrongKey);
          markQuestion("o" + index, true);
        } else {
          const tutor = tutorForSequence(item, values);
          answerLine.textContent = "有几句顺序不对。绿色句子保留，红色句子改数字，再试一次。";
          setTutor(tutorBox, tutor);
          recordWrong({
            key: item.wrongKey || makeQuestionKey("order", item.prompt, item.finalText),
            kind: "order",
            item,
            prompt: item.prompt,
            finalText: item.finalText,
            tutor
          });
          funnyWrongSound();
        }
      }
      item.lines.forEach((line, lineIndex) => {
        const lineRow = document.createElement("div");
        lineRow.className = "sequence-row";
        const input = document.createElement("input");
        input.className = "sequence-input";
        input.inputMode = "numeric";
        input.maxLength = 1;
        input.setAttribute("aria-label", `第${lineIndex + 2}句序号`);
        input.oninput = () => {
          input.value = input.value.replace(/[^2-6]/g, "").slice(0, 1);
          lineRow.classList.remove("good", "bad");
          row.classList.remove("good", "bad");
          answerLine.textContent = "";
        };
        const text = document.createElement("div");
        text.innerHTML = annotateText(line.text);
        lineRow.append(input, text);
        bank.appendChild(lineRow);
      });
      const checkButton = document.createElement("button");
      checkButton.className = "primary";
      checkButton.textContent = "确认顺序";
      checkButton.onclick = checkSequence;
      const showAnswer = document.createElement("button");
      showAnswer.className = "ghost";
      showAnswer.textContent = "我放弃，看答案";
      showAnswer.onclick = () => {
        if (done.has("o" + index)) return;
        answerLine.textContent = item.finalText;
        setTutor(tutorBox, {
          en: "Read the answer once. Try it again later.",
          zh: "读一遍答案。下次再从错题本练。"
        });
        bank.querySelectorAll(".sequence-input").forEach(input => input.disabled = true);
        checkButton.disabled = true;
        showAnswer.disabled = true;
        recordWrong({
          key: item.wrongKey || makeQuestionKey("order", item.prompt, item.finalText),
          kind: "order",
          item,
          prompt: item.prompt,
          finalText: item.finalText,
          tutor: tutorForSequence(item, [])
        });
        markQuestion("o" + index, false);
      };
      options.appendChild(checkButton);
      options.appendChild(showAnswer);
    }
    function renderCloze() {
      const list = document.getElementById("clozeList");
      list.innerHTML = "";
      const box = document.createElement("div");
      box.className = "cloze-box";
      currentCourse.clozeParts.forEach((part, i) => {
        const textPart = document.createElement("span");
        textPart.innerHTML = annotateText(part);
        box.append(textPart);
        if (i < currentCourse.clozeAnswers.length) {
          const blank = document.createElement("span");
          blank.className = "blank";
          blank.dataset.answer = currentCourse.clozeAnswers[i];
          blank.textContent = `${i + 1}`;
          box.appendChild(blank);
        }
      });
      const bank = document.createElement("div");
      bank.className = "word-bank";
      currentCourse.clozeWords.forEach(word => {
        const b = document.createElement("button");
        b.textContent = word;
        b.onclick = () => {
          const next = [...box.querySelectorAll(".blank")].find(x => /^\d+$/.test(x.textContent));
          if (!next) return;
          const isRight = word === next.dataset.answer;
          if (isRight) {
            next.textContent = word;
            next.classList.remove("bad");
            next.classList.add("good");
            [...bank.children].forEach(x => x.classList.remove("bad"));
            b.classList.add("good");
            markQuestion("c" + [...box.querySelectorAll(".blank")].indexOf(next), true);
          } else {
            next.classList.add("bad");
            b.classList.add("bad");
            funnyWrongSound();
          }
        };
        bank.appendChild(b);
      });
      const controls = document.createElement("div");
      controls.className = "bar";
      const read = document.createElement("button");
      read.className = "primary";
      read.textContent = "朗读短文";
      read.onclick = () => speak(currentCourse.clozeParts.join(" 空格 "));
      controls.append(read);
      const helpWords = vocabWordsInTexts([...(currentCourse.clozeParts || []), ...(currentCourse.clozeWords || [])]);
      const helpStrip = helpWords.length ? createVocabStrip(helpWords) : null;
      list.append(controls);
      if (helpStrip) list.appendChild(helpStrip);
      list.append(box, bank);
    }

    document.getElementById("backHome").onclick = () => {
      document.getElementById("courseView").classList.remove("active");
      document.getElementById("homeView").classList.add("active");
      document.getElementById("pageSub").textContent = "每周课程复习";
      renderGarage();
    };
    function setActivePanel(panelId) {
      const courseView = document.getElementById("courseView");
      courseView.querySelectorAll(".tab").forEach(t => {
        t.classList.toggle("active", t.dataset.panel === panelId);
      });
      courseView.querySelectorAll(".panel").forEach(p => {
        p.classList.toggle("active", p.id === panelId);
      });
    }
    function setActivePractice(sectionId) {
      const panel = document.getElementById("hclPracticePanel");
      panel.querySelectorAll(".subtab").forEach(t => {
        t.classList.toggle("active", t.dataset.section === sectionId);
      });
      panel.querySelectorAll(".practice-section").forEach(section => {
        section.classList.toggle("active", section.id === sectionId);
      });
    }
    document.querySelectorAll("#courseView .tab").forEach(tab => {
      tab.onclick = () => {
        setActivePanel(tab.dataset.panel);
      };
    });
    document.querySelectorAll("#hclPracticePanel .subtab").forEach(tab => {
      tab.onclick = () => {
        setActivePractice(tab.dataset.section);
      };
    });
    document.addEventListener("click", event => {
      const vocabButton = event.target.closest(".vocab-help");
      if (vocabButton) {
        event.preventDefault();
        event.stopPropagation();
        showVocabHelp(vocabButton.dataset.word);
      }
    });
    document.getElementById("voiceSelect").onchange = e => {
      selectedVoiceName = e.target.value;
      speak("这是智澹的中文朗读声音。");
    };
    document.getElementById("rateSlider").oninput = e => {
      speechRate = Number(e.target.value);
      document.getElementById("rateText").textContent = speechRate <= 0.45 ? "很慢" : speechRate <= 0.6 ? "慢" : "正常";
    };
    const parentDialog = document.getElementById("parentDialog");
    document.getElementById("openParent").onclick = () => parentDialog.showModal();
    document.getElementById("closeParent").onclick = () => parentDialog.close();
    document.getElementById("testVoice").onclick = () => speak("智澹，准备好了吗？赛车马上出发！");
    document.getElementById("lessonPhotos").onchange = e => {
      const files = [...e.target.files];
      const preview = document.getElementById("photoPreview");
      preview.innerHTML = "";
      files.forEach(file => {
        const img = document.createElement("img");
        img.alt = file.name;
        img.src = URL.createObjectURL(file);
        preview.appendChild(img);
      });
      document.getElementById("uploadStatus").textContent = files.length
        ? `已选择 ${files.length} 张照片`
        : "尚未选择照片";
      document.getElementById("prepareLesson").disabled = !files.length;
    };
    document.getElementById("prepareLesson").onclick = () => {
      document.getElementById("uploadStatus").textContent =
        "照片已准备好。请在 Codex 对话中发送这些照片，我会生成并加入下一节课。";
    };
    renderVoices();
    renderHome();
  </script>
</body>
